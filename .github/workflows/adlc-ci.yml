name: ADLC - CI Pipeline

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - 'conductor/**'
      - 'docs/**'
      - '.gitignore'
      - 'codecov.yml'
      - '.vscode/**'
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: jules
    
    defaults:
      run:
        shell: bash

    env:
      POSTGRES_USER: audit_admin
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: audit_db
      APP_DB_USER: audit_app
      APP_DB_PASSWORD: ${{ secrets.APP_DB_PASSWORD }}
      DATABASE_URL: postgresql+asyncpg://audit_app:${{ secrets.APP_DB_PASSWORD }}@localhost:5433/audit_db
      ADMIN_DATABASE_URL: postgresql+asyncpg://audit_admin:${{ secrets.POSTGRES_PASSWORD }}@localhost:5433/audit_db
      KEYCLOAK_URL: http://localhost:8080
      KEYCLOAK_REALM: audit-realm
      KEYCLOAK_ADMIN_USER: admin
      KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
      KEYCLOAK_AUDIENCE: audit-api
      KEYCLOAK_DB_NAME: keycloak
      KEYCLOAK_DB_USER: keycloak
      KEYCLOAK_DB_PASSWORD: ${{ secrets.KEYCLOAK_DB_PASSWORD }}
      ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Jules CLI
        run: npm install -g @google/jules

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start services
        run: docker compose up -d

      - name: Wait for Postgres
        run: |
          for ((i=1;i<=30;i++)); do
            if docker compose exec -T db pg_isready -U audit_admin -d audit_db; then
              echo "Postgres is ready!"
              exit 0
            fi
            echo "Waiting for Postgres... ($i/30)"
            sleep 2
          done
          echo "Postgres failed to become ready"
          docker compose logs db
          exit 1

      - name: Wait for Keycloak
        run: |
          for ((i=1;i<=30;i++)); do
            if curl -s http://localhost:8080/health/live | grep -q "UP" || curl -s http://localhost:8080/health | grep -q "UP"; then
              echo "Keycloak is ready!"
              exit 0
            fi
            echo "Waiting for Keycloak... ($i/30)"
            sleep 5
          done
          echo "Keycloak failed to become ready"
          docker compose logs keycloak
          exit 1

      - name: Run tests
        run: |
          pytest --cov=app --cov-report=xml --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: "Jules: Auto-Remediation"
        if: failure()
        uses: google-labs-code/jules-action@v1.0.0
        with:
          prompt: "The CI pipeline failed. Please analyze the logs and provide a fix for the failure."
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: ${{ github.ref_name }}
