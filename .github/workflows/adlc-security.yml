name: ADLC - Security Analysis

on:
  schedule:
    # Nightly run at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest
    environment: jules
    
    defaults:
      run:
        shell: bash

    env:
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Jules: Security Analysis"
        uses: google-labs-code/jules-action@v1.0.0
        with:
          prompt: "Analyze the codebase for security vulnerabilities and compliance with audit standards."
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: ${{ github.ref_name }}
