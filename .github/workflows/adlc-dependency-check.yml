name: ADLC - Dependency Check

on:
  schedule:
    # Weekly run at 00:00 UTC on Sunday
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit -r requirements.txt

      - name: Dependency Security Scan
        run: |
          pip-audit
